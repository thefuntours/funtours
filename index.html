<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The FunTours — Discover the World, Your Way</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Playfair+Display:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --brand-900:#0c3547;--brand-800:#0a4d6e;--brand-700:#0369a1;--brand-600:#0284c7;
  --brand-500:#0ea5e9;--brand-400:#38bdf8;--brand-100:#e0f2fe;--brand-50:#f0f9ff;
  --red-500:#ef4444;--red-600:#dc2626;--red-100:#fee2e2;--red-50:#fef2f2;
  --green-600:#16a34a;--green-100:#dcfce7;--green-50:#f0fdf4;
  --amber-500:#f59e0b;--amber-100:#fef3c7;--amber-50:#fffbeb;
  --blue-500:#3b82f6;--blue-100:#dbeafe;--blue-50:#eff6ff;
  --violet-600:#7c3aed;--violet-100:#e9d5ff;
  --slate-900:#0f172a;--slate-700:#334155;--slate-500:#64748b;--slate-400:#94a3b8;
  --slate-300:#cbd5e1;--slate-200:#e2e8f0;--slate-100:#f1f5f9;--slate-50:#f8fafc;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#eef1f5;color:var(--slate-900);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:3px}
input,select,textarea,button{font-family:inherit}
.hidden{display:none!important}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e8ecf0;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.btn{padding:9px 18px;border-radius:9px;border:none;cursor:pointer;font-weight:600;font-size:13px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--brand-600),var(--brand-500));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(2,132,199,.35)}
.btn-danger{background:var(--red-100);color:#dc2626}.btn-danger:hover{background:#fecaca}
.btn-outline{background:#fff;color:var(--slate-700);border:1.5px solid var(--slate-200)}.btn-outline:hover{border-color:var(--brand-500);color:var(--brand-600)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:14px 30px;font-size:15px}
.btn-pill{border-radius:50px}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;white-space:nowrap}
.input{width:100%;padding:10px 14px;border:1.5px solid var(--slate-200);border-radius:9px;font-size:14px;transition:border-color .2s,box-shadow .2s;outline:none;font-family:inherit;background:#fff}
.input:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(14,165,233,.1)}
textarea.input{resize:vertical;min-height:60px}
.label{font-size:11px;font-weight:700;color:var(--slate-500);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.6px}
.grid{display:grid}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(310px,1fr))}
table.tbl{width:100%;border-collapse:separate;border-spacing:0}
table.tbl th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e8ecf0;background:var(--slate-50)}
table.tbl th:first-child{border-radius:10px 0 0 0}table.tbl th:last-child{border-radius:0 10px 0 0}
table.tbl td{padding:12px 16px;font-size:13px;color:var(--slate-700);border-bottom:1px solid var(--slate-100)}
table.tbl tbody tr{cursor:pointer;transition:background .15s}table.tbl tbody tr:hover td{background:var(--slate-50)}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:500;font-size:13px;background:transparent;color:var(--slate-500);transition:all .15s;font-family:inherit}
.tab-btn.active{background:var(--brand-600);color:#fff}.tab-btn:hover:not(.active){background:var(--slate-100)}
.sidebar-btn{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;color:var(--slate-500);border:none;background:none;width:100%;text-align:left;font-family:inherit}
.sidebar-btn:hover{background:var(--brand-100);color:var(--brand-600)}
.sidebar-btn.active{background:linear-gradient(135deg,var(--brand-600),var(--brand-500));color:#fff;box-shadow:0 4px 12px rgba(2,132,199,.3)}
.sidebar-btn .icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .2s}
.modal{background:#fff;border-radius:18px;padding:28px;max-width:700px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.12);animation:scaleIn .25s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.progress-bar{display:flex;gap:3px}.progress-step{height:7px;border-radius:4px;flex:1;cursor:pointer;transition:background .3s,transform .15s}.progress-step:hover{transform:scaleY(1.6)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--slate-900);color:#fff;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:2000;animation:slideUp .3s;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.chk-label{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:14px}
.chk-label:hover{background:var(--brand-50)}.chk-label input[type=checkbox]{width:18px;height:18px;accent-color:var(--brand-600);cursor:pointer}
.chk-label.checked{background:var(--brand-100);font-weight:600;color:var(--brand-600)}
.stat-card{padding:20px;border-radius:14px;display:flex;align-items:center;gap:14px;border:none}
.stat-icon{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
.header{background:linear-gradient(135deg,var(--brand-900),var(--brand-700),var(--brand-600));padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(0,0,0,.18);position:sticky;top:0;z-index:100}
.sidebar{width:248px;background:#fff;border-right:1px solid #e8ecf0;padding:16px 12px;display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex-shrink:0}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0c3547 0%,#0a4d6e 40%,#0284c7 100%);position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:rgba(14,165,233,.15);top:-200px;right:-100px}
.login-wrap::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(239,68,68,.08);bottom:-150px;left:-100px}
.login-box{background:#fff;border-radius:24px;padding:44px;width:420px;max-width:95%;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative;z-index:1;text-align:center}
.web-hero{background:linear-gradient(135deg,var(--brand-900) 0%,var(--brand-700) 50%,var(--brand-500) 100%);padding:0 24px;min-height:520px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.web-hero::before{content:'';position:absolute;width:700px;height:700px;border-radius:50%;background:rgba(255,255,255,.04);top:-300px;right:-200px}
.web-hero::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:rgba(239,68,68,.06);bottom:-250px;left:-150px}
.web-nav{display:flex;justify-content:space-between;align-items:center;padding:18px 0;position:relative;z-index:2}
.web-nav-links{display:flex;gap:28px;align-items:center}
.web-nav-links a{color:rgba(255,255,255,.85);font-size:14px;font-weight:500;text-decoration:none;transition:color .2s;position:relative}
.web-nav-links a:hover{color:#fff}
.web-nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:#fff;transition:width .3s}
.web-nav-links a:hover::after{width:100%}
.web-hero-content{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding-bottom:50px;position:relative;z-index:2}
.web-stats{display:flex;justify-content:center;gap:0;padding:0;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.08);max-width:800px;margin:-40px auto 0;border-radius:16px;position:relative;z-index:3}
.web-stat-item{flex:1;padding:28px 20px;text-align:center;border-right:1px solid var(--slate-100)}.web-stat-item:last-child{border-right:none}
.pkg-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #e8ecf0;cursor:pointer;transition:all .3s}
.pkg-card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.pkg-thumb{height:200px;background:linear-gradient(135deg,var(--brand-900),var(--brand-500));display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;overflow:hidden}
.pkg-thumb img{width:100%;height:100%;object-fit:cover}
.pkg-type-badge{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.35);color:#fff;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;backdrop-filter:blur(6px)}
.pkg-body{padding:22px}
.highlight-tag{background:var(--brand-100);color:var(--brand-600);padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;display:inline-block}
.web-footer{background:var(--brand-900);padding:52px 24px;color:#fff}
.web-footer-bottom{background:#082f49;padding:18px 24px;text-align:center;color:rgba(255,255,255,.5);font-size:13px}
.web-section{max-width:1120px;margin:0 auto;padding:60px 24px}
.why-card{text-align:center;padding:30px 24px;border-radius:16px;background:#fff;border:1px solid var(--slate-100);transition:all .3s}
.why-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.why-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 14px}
.dest-card{border-radius:16px;overflow:hidden;position:relative;height:220px;cursor:pointer;transition:transform .3s}
.dest-card:hover{transform:scale(1.03)}
.dest-card img{width:100%;height:100%;object-fit:cover}
.dest-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);display:flex;align-items:flex-end;padding:20px;color:#fff}
.logo-link{cursor:pointer;display:flex;align-items:center}
@media(max-width:900px){.sidebar{width:210px}.grid-2,.grid-3{grid-template-columns:1fr}.grid-auto{grid-template-columns:1fr}.web-stats{flex-wrap:wrap}}
@media(max-width:700px){.sidebar{position:fixed;top:62px;left:0;bottom:0;z-index:90;width:260px;box-shadow:4px 0 20px rgba(0,0,0,.15);transform:translateX(0)}.sidebar.closed{transform:translateX(-100%)}.header{padding:0 14px}.web-nav-links{gap:14px}.web-hero h1{font-size:32px!important}}
</style>
</head>

async function dbLoad(){
  try{
    if(SUPABASE_URL.includes('YOUR_PROJECT')){
      toast('\u26a0\ufe0f Set your Supabase URL & Key in the HTML file!');
      return;
    }
    const[b,s,p,d,e]=await Promise.all([
      _sb.from('branches').select('*').order('id'),
      _sb.from('staff').select('*').order('id'),
      _sb.from('packages').select('*').order('created_at'),
      _sb.from('destinations').select('*').order('created_at'),
      _sb.from('enquiries').select('*').order('created_at',{ascending:false}),
    ]);
    const anyError=b.error||s.error||p.error||d.error||e.error;
    if(anyError){
      console.error('Supabase error:',anyError);
      if(anyError.code==='42P01'){
        toast('\u26a0\ufe0f Tables not found. Run the Setup SQL (check console)!');
        console.log('%c\n\u2550\u2550\u2550 RUN THIS SQL IN SUPABASE \u2192 SQL EDITOR \u2550\u2550\u2550\n','color:orange;font-size:14px;font-weight:bold');
        console.log(SETUP_SQL);
      } else {
        toast('\u26a0\ufe0f DB Error: '+anyError.message);
      }
      return;
    }
    state.branches = b.data||[];
    state.staff    = s.data||[];
    state.packages = (p.data||[]).map(x=>({...x,imageUrl:x.image_url}));
    state.destinations = d.data||[];
    // Sync staff logins into state.users (keep master admin, add staff with credentials)
    const masterUsers=state.users.filter(u=>u.role==='Master');
    const staffUsers=(s.data||[]).filter(x=>x.username&&x.password).map(x=>({username:x.username,password:x.password,name:x.name,role:x.role||'Staff',staffId:x.id}));
    state.users=[...masterUsers,...staffUsers];
    state.enquiries = (e.data||[]).map(dbToEnq);
  }catch(err){
    console.error('DB connection error:',err);
    toast('\u26a0\ufe0f Cannot connect. Check Supabase URL & Key.');
  }
}

function doChangePassword(){

  const conf=$('#cp_confirm')?.value;
  const errEl=$('#cp_error');
  const okEl=$('#cp_success');
  const showErr=msg=>{errEl.textContent=msg;errEl.style.display='block';okEl.style.display='none'};

  if(cur!==user.password){showErr('\u274c Current password is incorrect.');return;}

  user.password=nw;

  okEl.style.display='block';

  $('#cp_new').value='';
  $('#cp_confirm').value='';

  const cards=[{label:'Total Enquiries',value:s.total,icon:'\ud83d\udccb',bg:'linear-gradient(135deg,#eff6ff,#dbeafe)',ibg:'#3b82f6'},{label:'Active',value:s.active,icon:'\u26a1',bg:'linear-gradient(135deg,#f0fdf4,#dcfce7)',ibg:'#22c55e'},{label:'Overdue',value:s.overdue,icon:'\ud83d\udd34',bg:'linear-gradient(135deg,#fef2f2,#fee2e2)',ibg:'#ef4444'},{label:'Due Today',value:s.today,icon:'\ud83d\udfe1',bg:'linear-gradient(135deg,#fffbeb,#fef3c7)',ibg:'#f59e0b'}];
  const recent=[...state.enquiries].reverse().slice(0,8);
  const svcs=[{label:'Packages',count:s.pkg,color:'#3b82f6',icon:'\ud83e\uddf3'},{label:'Passport',count:s.passport,color:'#8b5cf6',icon:'\ud83d\udcd5'},{label:'Visa',count:s.visa,color:'#f59e0b',icon:'\ud83d\udcc4'},{label:'Flight Tickets',count:s.flight,color:'#ef4444',icon:'\u2708\ufe0f'}];
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><div><h1 style="font-size:28px;font-weight:700">Dashboard</h1><p style="color:var(--slate-500);font-size:14px;margin-top:2px">Welcome back, ${state.user?.name||'Admin'}</p></div><button class="btn btn-primary btn-lg" onclick="state.modal='new_enquiry';render()">+ New Enquiry</button></div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:24px">${cards.map(c=>`<div class="stat-card card" style="background:${c.bg}"><div class="stat-icon" style="background:${c.ibg}">${c.icon}</div><div><div style="font-size:30px;font-weight:800">${c.value}</div><div style="font-size:12px;font-weight:500;color:var(--slate-500)">${c.label}</div></div></div>`).join('')}</div>
  <div class="grid grid-2" style="gap:16px"><div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Service Distribution</h3>${svcs.map(sd=>`<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><span style="font-size:20px">${sd.icon}</span><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:13px;font-weight:500">${sd.label}</span><span style="font-size:13px;font-weight:700">${sd.count}</span></div><div style="height:8px;background:var(--slate-100);border-radius:4px;overflow:hidden"><div style="height:100%;width:${s.total?((sd.count/s.total)*100):0}%;background:${sd.color};border-radius:4px"></div></div></div></div>`).join('')}</div>
  <div class="card"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Recent Enquiries</h3>${recent.length===0?'<div style="text-align:center;padding:40px;color:var(--slate-400)">No enquiries yet</div>':recent.map(e=>{const b=dueBadge(e.dueDate);return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;background:var(--slate-50);margin-bottom:6px;cursor:pointer" onclick="state.page='enquiries';state.selectedEnquiry='${e.id}';render()"><div><div style="font-weight:600;font-size:13px">${esc(e.customerName)}</div><div style="font-size:11px;color:var(--slate-400)">${e.services?.join(', ')}</div></div><span class="badge" style="background:${b.bg};color:${b.color}">${b.label}</span></div>`}).join('')}</div></div>`;
}

/* ======= BRANCHES ======= */

  return `<h1 style="font-size:28px;font-weight:700;margin-bottom:24px">\ud83c\udfe2 Branches</h1>
  <div class="card" style="margin-bottom:20px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">${state.editingBranch?'Edit':'Add New'} Branch</h3>
  <div class="grid grid-2" style="gap:12px"><div><label class="label">Branch Name</label><input class="input" id="br_name"></div><div><label class="label">City</label><input class="input" id="br_city"></div><div><label class="label">Address</label><input class="input" id="br_address"></div><div><label class="label">Phone</label><input class="input" id="br_phone"></div></div>
  <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-primary" onclick="saveBranch()">${state.editingBranch?'Update':'Add Branch'}</button>${state.editingBranch?'<button class="btn btn-outline" onclick="state.editingBranch=null;render()">Cancel</button>':''}</div></div>
  <div class="card"><table class="tbl"><thead><tr><th>Branch</th><th>City</th><th>Address</th><th>Phone</th><th>Actions</th></tr></thead><tbody>${state.branches.map(b=>`<tr><td style="font-weight:600">${esc(b.name)}</td><td>${esc(b.city)}</td><td>${esc(b.address)}</td><td>${esc(b.phone)}</td><td><div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" onclick="editBranch(${b.id})">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteBranch(${b.id})">Delete</button></div></td></tr>`).join('')}</tbody></table></div>`;
}

/* ======= STAFF ======= */

  <div class="card" style="margin-bottom:20px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">${state.editingStaff?'Edit':'Add New'} Staff</h3>
  <div class="grid grid-3" style="gap:12px"><div><label class="label">Full Name</label><input class="input" id="st_name"></div><div><label class="label">Role</label><select class="input" id="st_role"><option>Staff</option><option>Master</option></select></div><div><label class="label">Branch</label><select class="input" id="st_branch"><option value="">Select...</option>${state.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select></div><div><label class="label">Phone</label><input class="input" id="st_phone"></div><div><label class="label">Email</label><input class="input" id="st_email"></div><div><label class="label">Login Username</label><input class="input" id="st_username" placeholder="e.g. ravi123"></div><div><label class="label">Login Password</label><input class="input" type="password" id="st_password" placeholder="${state.editingStaff?'Leave blank to keep':'Set password'}"></div></div>
  <div style="background:var(--brand-50);border:1px solid var(--brand-100);border-radius:10px;padding:12px 16px;margin-top:12px;font-size:13px;color:var(--brand-700)">💡 Username & Password allow this staff member to log in to the admin dashboard.</div>
  <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-primary" onclick="saveStaff()">${state.editingStaff?'Update':'Add Staff'}</button>${state.editingStaff?'<button class="btn btn-outline" onclick="state.editingStaff=null;render()">Cancel</button>':''}</div></div>
  <div class="card"><table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Branch</th><th>Phone</th><th>Username</th><th>Login</th><th>Actions</th></tr></thead><tbody>${state.staff.map(s=>{const br=state.branches.find(b=>b.id===s.branch);return `<tr><td style="font-weight:600">${esc(s.name)}</td><td><span class="badge" style="background:${s.role==='Master'?'var(--amber-100)':'var(--brand-100)'};color:${s.role==='Master'?'#d97706':'var(--brand-600)'}">${s.role}</span></td><td>${br?esc(br.name):'\u2014'}</td><td>${esc(s.phone)}</td><td style="font-size:13px;color:var(--slate-500)">${esc(s.username)||'\u2014'}</td><td><span class="badge" style="background:${s.username?'var(--green-100)':'var(--slate-100)'};color:${s.username?'var(--green-600)':'var(--slate-400)'}">${s.username?'✅ Can Login':'❌ No Access'}</span></td><td><div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" onclick="editStaff(${s.id})">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteStaff(${s.id})">Delete</button></div></td></tr>`}).join('')}</tbody></table></div>`;
}

/* ======= ENQUIRIES ======= */
function renderEnquiries(){
  const tabs=[{key:null,label:'All'},{key:'preparation',label:'In Preparation'},{key:'itinerary_sent',label:'Itinerary Sent'},{key:'discussion',label:'Discussion'},{key:'confirmed',label:'Confirmed'},{key:'dropped',label:'Dropped'}];
  const map={preparation:'In Preparation',itinerary_sent:'Itinerary Sent',discussion:'Itinerary Discussion',confirmed:'Confirmed',dropped:'Dropped'};
  const filtered=state.subPage?state.enquiries.filter(e=>e.pkgStage===map[state.subPage]):state.enquiries;
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h1 style="font-size:28px;font-weight:700">\ud83d\udccb Enquiries</h1><button class="btn btn-primary" onclick="state.modal='new_enquiry';render()">+ New Enquiry</button></div>
  <div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap">${tabs.map(t=>`<button class="tab-btn${state.subPage===t.key?' active':''}" onclick="state.subPage=${t.key===null?'null':"'"+t.key+"'"};render()">${t.label}</button>`).join('')}</div>
  <div class="card">${filtered.length===0?'<div style="text-align:center;padding:40px;color:var(--slate-400)">No enquiries found</div>':`<table class="tbl"><thead><tr><th>Customer</th><th>Phone</th><th>Services</th><th>Assigned</th><th>Stage</th><th>Due</th><th>Status</th></tr></thead><tbody>${[...filtered].reverse().map(e=>{const b=dueBadge(e.dueDate);const st=state.staff.find(s=>s.id===Number(e.assignedTo));return `<tr onclick="state.selectedEnquiry='${e.id}';render()"><td style="font-weight:600">${esc(e.customerName)}</td><td>${esc(e.phone)}</td><td>${e.services?.map(s=>`<span class="badge" style="background:var(--brand-100);color:var(--brand-600);font-size:10px;margin:1px">${s}</span>`).join(' ')}</td><td>${st?esc(st.name):'\u2014'}</td><td style="font-size:12px;font-weight:600">${esc(e.currentStage)||'\u2014'}</td><td>${fmt(e.dueDate)}</td><td><span class="badge" style="background:${b.bg};color:${b.color}">${b.label}</span></td></tr>`}).join('')}</tbody></table>`}</div>`;
}

/* ======= ENQUIRY DETAIL ======= */
function renderEnquiryDetail(){
  const e=state.enquiries.find(x=>x.id===state.selectedEnquiry);
  if(!e){state.selectedEnquiry=null;return renderEnquiries()}
  const b=dueBadge(e.dueDate);const staff=state.staff.find(s=>s.id===Number(e.assignedTo));
  let h=`<button class="btn btn-outline" onclick="state.selectedEnquiry=null;render()" style="margin-bottom:16px">\u2190 Back</button>
  <div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><h2 style="font-size:24px;font-weight:700">${esc(e.customerName)}</h2><p style="color:var(--slate-500);font-size:14px;margin-top:4px">\ud83d\udcde ${esc(e.phone)} &nbsp;\u00b7&nbsp; Created: ${fmt(e.createdAt)}</p></div><span class="badge" style="background:${b.bg};color:${b.color};font-size:13px;padding:8px 16px">${b.label}</span></div>
  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">${e.services?.map(s=>`<span class="badge" style="background:var(--brand-100);color:var(--brand-600);padding:6px 14px;font-size:12px">${s}</span>`).join('')}${e.tripType?`<span class="badge" style="background:var(--amber-100);color:#d97706;padding:6px 14px;font-size:12px">${e.tripType}</span>`:''}</div>
  ${staff?`<p style="margin-top:8px;font-size:13px;color:var(--slate-500)">Assigned to: <strong>${esc(staff.name)}</strong></p>`:''}</div>`;
  if(e.services?.includes('Packages')){h+=`<div class="card" style="margin-bottom:16px"><h3 style="font-weight:700;margin-bottom:12px">\ud83e\uddf3 Package Details</h3><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px"><div><span class="label">Location</span><div style="font-weight:500">${esc(e.pkgLocation)||'\u2014'}</div></div><div><span class="label">Packs</span><div style="font-weight:500">${e.pkgPacks||'\u2014'}</div></div><div><span class="label">Travel Date</span><div style="font-weight:500">${e.pkgFlexDates?'Flexible':fmt(e.pkgTravelDate)}</div></div><div><span class="label">Hotel</span><div style="font-weight:500">${esc(e.pkgHotel)||'\u2014'}</div></div><div><span class="label">Meal Plan</span><div style="font-weight:500">${esc(e.pkgMeal)||'\u2014'}</div></div></div>${renderTracker('Packages',PKG_STAGES,e.pkgStage)}${e.pkgStage==='Confirmed'?`<div style="margin-top:16px;padding:16px;background:var(--green-50);border-radius:10px;border:1px solid #bbf7d0"><h4 style="font-size:14px;font-weight:700;color:var(--green-600);margin-bottom:8px">\u2705 Confirmed \u2014 Tasks</h4><div style="display:flex;gap:8px;flex-wrap:wrap">${CONFIRMED_TASKS.map(t=>`<span class="badge" style="background:var(--green-100);color:var(--green-600);padding:6px 14px">${t}</span>`).join('')}</div></div>`:''}</div>`}
  if(e.services?.includes('Passport')){h+=`<div class="card" style="margin-bottom:16px"><h3 style="font-weight:700;margin-bottom:12px">\ud83d\udcd5 Passport</h3><div style="margin-bottom:12px"><span class="label">Type: </span><span style="font-weight:500">${esc(e.passportType)||'New'}</span></div>${renderTracker('Passport',PASSPORT_STAGES,e.passportStage)}<div style="margin-top:12px"><label class="label">Notes</label><textarea class="input" rows="2" id="passport_notes">${esc(e.passportNotes||'')}</textarea><button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="saveServiceNotes('${e.id}','passportNotes','passport_notes')">Save</button></div></div>`}
  if(e.services?.includes('Visa')){h+=`<div class="card" style="margin-bottom:16px"><h3 style="font-weight:700;margin-bottom:12px">\ud83d\udcc4 Visa</h3>${renderTracker('Visa',VISA_STAGES,e.visaStage)}<div style="margin-top:12px"><label class="label">Notes</label><textarea class="input" rows="2" id="visa_notes">${esc(e.visaNotes||'')}</textarea><button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="saveServiceNotes('${e.id}','visaNotes','visa_notes')">Save</button></div></div>`}
  if(e.services?.includes('Flight Ticket')){h+=`<div class="card" style="margin-bottom:16px"><h3 style="font-weight:700;margin-bottom:12px">\u2708\ufe0f Flight Ticket</h3>${renderTracker('Flight Ticket',FLIGHT_STAGES,e.flightStage)}<div style="margin-top:12px"><label class="label">Notes</label><textarea class="input" rows="2" id="flight_notes">${esc(e.flightNotes||'')}</textarea><button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="saveServiceNotes('${e.id}','flightNotes','flight_notes')">Save</button></div></div>`}
  h+=`<div class="card"><h3 style="font-weight:700;margin-bottom:12px">\ud83d\udcdd Activity Log</h3><div style="display:flex;gap:8px;margin-bottom:16px"><input class="input" placeholder="Add a note..." id="log_note" onkeydown="if(event.key==='Enter')addLogNote('${e.id}')"><button class="btn btn-primary" onclick="addLogNote('${e.id}')">Add</button></div><div style="max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:6px">${[...(e.logs||[])].reverse().map(l=>`<div style="padding:8px 12px;background:var(--slate-50);border-radius:8px;font-size:13px;border-left:3px solid var(--brand-500)">${esc(l)}</div>`).join('')}</div></div>`;
  return h;
}

function renderTracker(service,stages,current){
  const idx=stages.indexOf(current);
  return `<div style="margin-top:12px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="label" style="margin:0">Stage: ${esc(current)}</span><button class="btn btn-primary btn-sm" onclick="advanceStage('${service}')" ${idx>=stages.length-1?'disabled style="opacity:.5"':''}>Advance \u2192</button></div><div class="progress-bar">${stages.map((s,i)=>`<div class="progress-step" title="${esc(s)}" onclick="setStage('${service}','${s}')" style="background:${i<=idx?'var(--brand-600)':i===idx+1?'#bae6fd':'var(--slate-200)'}"></div>`).join('')}</div><div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--slate-400)">${esc(stages[0])}</span><span style="font-size:11px;color:var(--slate-400)">${esc(stages[stages.length-1])}</span></div></div>`;
}

/* ======= FILTERED ======= */
function renderFiltered(){
  const titles={f_overdue:'\ud83d\udd34 Overdue',f_today:'\ud83d\udfe1 Due Today',f_pkg:'\ud83e\uddf3 Packages',f_passport:'\ud83d\udcd5 Passport',f_visa:'\ud83d\udcc4 Visa',f_flight:'\u2708\ufe0f Flights'};
  let list;switch(state.page){case 'f_overdue':list=state.enquiries.filter(e=>daysDiff(e.dueDate)<0);break;case 'f_today':list=state.enquiries.filter(e=>daysDiff(e.dueDate)===0);break;case 'f_pkg':list=state.enquiries.filter(e=>e.services?.includes('Packages'));break;case 'f_passport':list=state.enquiries.filter(e=>e.services?.includes('Passport'));break;case 'f_visa':list=state.enquiries.filter(e=>e.services?.includes('Visa'));break;case 'f_flight':list=state.enquiries.filter(e=>e.services?.includes('Flight Ticket'));break;default:list=state.enquiries}
  return `<h1 style="font-size:28px;font-weight:700;margin-bottom:24px">${titles[state.page]||'Filtered'}</h1><div class="card">${list.length===0?'<div style="text-align:center;padding:40px;color:var(--slate-400)">No items</div>':`<table class="tbl"><thead><tr><th>Customer</th><th>Phone</th><th>Services</th><th>Stage</th><th>Due</th></tr></thead><tbody>${list.map(e=>{const b=dueBadge(e.dueDate);return `<tr onclick="state.page='enquiries';state.selectedEnquiry='${e.id}';render()"><td style="font-weight:600">${esc(e.customerName)}</td><td>${esc(e.phone)}</td><td>${e.services?.join(', ')}</td><td>${esc(e.currentStage)}</td><td><span class="badge" style="background:${b.bg};color:${b.color}">${b.label}</span></td></tr>`}).join('')}</tbody></table>`}</div>`;
}

/* ======= PACKAGES ADMIN ======= */

  return `<h1 style="font-size:28px;font-weight:700;margin-bottom:24px">\ud83d\udce6 Manage Packages</h1>

  <div style="display:flex;gap:8px;margin-top:16px"><button class="btn btn-primary" onclick="savePackage()">${state.editingPkg?'Update':'Create Package'}</button>${state.editingPkg?'<button class="btn btn-outline" onclick="state.editingPkg=null;render()">Cancel</button>':''}</div></div>
  <div class="grid grid-auto" style="gap:16px">${state.packages.map(p=>`<div class="card" style="padding:0;overflow:hidden"><div style="height:140px;background:linear-gradient(135deg,var(--brand-900),var(--brand-500));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">${p.imageUrl?`<img src="${esc(p.imageUrl)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:'<span style="font-size:56px">\ud83c\udf0d</span>'}<span class="badge" style="position:absolute;top:10px;right:10px;background:${p.type==='Domestic'?'var(--green-100)':'var(--brand-100)'};color:${p.type==='Domestic'?'var(--green-600)':'var(--brand-600)'}">${p.type}</span></div><div style="padding:18px"><h3 style="font-weight:700;font-size:17px">${esc(p.title)}</h3><p style="font-size:13px;color:var(--slate-500);margin-top:4px">${esc(p.location)} \u00b7 ${p.days} Days</p><p style="font-size:22px;font-weight:800;color:var(--brand-600);margin-top:8px">\u20b9${num(p.price)}</p><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-outline btn-sm" onclick="editPackage('${p.id}')">Edit</button><button class="btn btn-danger btn-sm" onclick="deletePackage('${p.id}')">Delete</button></div></div></div>`).join('')}</div>`;
}

/* ======= DESTINATIONS ADMIN ======= */
function renderDestinationsAdmin(){
  return `<h1 style="font-size:28px;font-weight:700;margin-bottom:24px">\ud83c\udf0d Trending Destinations</h1>
  <div class="card" style="margin-bottom:20px"><h3 style="font-size:15px;font-weight:700;margin-bottom:16px">${state.editingDest?'Edit':'Add New'} Destination</h3>
  <div class="grid grid-2" style="gap:12px"><div><label class="label">Destination Name</label><input class="input" id="dest_name" placeholder="e.g. Maldives"></div><div><label class="label">Destination Image</label><input type="file" accept="image/*" id="dest_image" onchange="previewDestImage()" class="input" style="padding:6px;cursor:pointer"><div id="dest_img_preview"></div></div></div>
  <div id="dest_current_img" style="margin-top:6px"></div>

// ── Branches ──────────────────────────────────────────────────────────────
async function saveBranch(){
  const n=$('#br_name')?.value,c=$('#br_city')?.value,a=$('#br_address')?.value,p=$('#br_phone')?.value;
  if(!n)return;
  let error;
  if(state.editingBranch){
    ({error}=await _sb.from('branches').update({name:n,city:c,address:a,phone:p}).eq('id',state.editingBranch));
    state.editingBranch=null;
  }else{
    ({error}=await _sb.from('branches').insert({name:n,city:c,address:a,phone:p,active:true}));
  }
  if(error){toast('\u274c '+error.message);return;}
  toast('Branch saved!');await dbLoad();render();
}
function editBranch(id){state.editingBranch=id;render();const b=state.branches.find(x=>x.id===id);if(b){$('#br_name').value=b.name;$('#br_city').value=b.city;$('#br_address').value=b.address;$('#br_phone').value=b.phone||''}}
async function deleteBranch(id){
  const{error}=await _sb.from('branches').delete().eq('id',id);
  if(error){toast('\u274c '+error.message);return;}
  toast('Deleted');await dbLoad();render();
}

// ── Staff ─────────────────────────────────────────────────────────────────
async function saveStaff(){
  const n=$('#st_name')?.value,r=$('#st_role')?.value,b=Number($('#st_branch')?.value)||null,
  p=$('#st_phone')?.value,e=$('#st_email')?.value,
  uname=$('#st_username')?.value?.trim()||null,
  pwd=$('#st_password')?.value||null;
  if(!n)return;
  // Check username uniqueness among staff
  if(uname){
    const dup=state.staff.find(x=>x.username===uname&&x.id!==state.editingStaff);
    if(dup){toast('\u274c Username already taken by '+dup.name);return;}
  }
  let error;
  if(state.editingStaff){
    const upd={name:n,role:r,branch:b,phone:p,email:e,username:uname};
    if(pwd)upd.password=pwd; // only update password if a new one is entered
    ({error}=await _sb.from('staff').update(upd).eq('id',state.editingStaff));
    state.editingStaff=null;
  }else{
    ({error}=await _sb.from('staff').insert({name:n,role:r,branch:b,phone:p,email:e,username:uname,password:pwd,active:true}));
  }
  if(error){toast('\u274c '+error.message);return;}
  toast('Staff saved!');await dbLoad();render();
}
function editStaff(id){
  state.editingStaff=id;render();
  const s=state.staff.find(x=>x.id===id);
  if(s){
    $('#st_name').value=s.name;
    $('#st_role').value=s.role;
    $('#st_branch').value=s.branch||'';
    $('#st_phone').value=s.phone||'';
    $('#st_email').value=s.email||'';
    $('#st_username').value=s.username||'';
    $('#st_password').value=''; // leave blank — only fill to change
  }
}
async function deleteStaff(id){
  const{error}=await _sb.from('staff').delete().eq('id',id);
  if(error){toast('\u274c '+error.message);return;}
  toast('Deleted');await dbLoad();render();
}

// ── Packages ──────────────────────────────────────────────────────────────
async function savePackage(){
  const t=$('#pk_title')?.value,ty=$('#pk_type')?.value,l=$('#pk_location')?.value,
  d=$('#pk_days')?.value,p=$('#pk_price')?.value,
  desc=$('#pk_desc')?.value,hl=$('#pk_highlights')?.value;
  if(!t)return;
  const highlights=hl?hl.split(',').map(s=>s.trim()).filter(Boolean):[];
  let image_url=state._pkgEditImg||null;
  const pkFile=$('#pk_image');
  if(pkFile?.files?.length){
    try{toast('\u23f3 Uploading image...');image_url=await uploadImage('package-images',pkFile.files[0]);}
    catch(err){toast('\u274c Upload failed: '+err.message);return;}
  }
  const row={title:t,type:ty,location:l,days:Number(d),price:Number(p),image_url,description:desc,highlights,active:true};
  let error;
  if(state.editingPkg){
    ({error}=await _sb.from('packages').update(row).eq('id',state.editingPkg));
    state.editingPkg=null;
  }else{
    row.id=uid();
    ({error}=await _sb.from('packages').insert(row));
  }
  state._pkgEditImg=null;
  if(error){toast('\u274c '+error.message);return;}
  toast('Package saved!');await dbLoad();render();
}
function editPackage(id){
  state.editingPkg=id;render();
  const p=state.packages.find(x=>x.id===id);
  if(p){
    $('#pk_title').value=p.title;$('#pk_type').value=p.type;
    $('#pk_location').value=p.location;$('#pk_days').value=p.days;
    $('#pk_price').value=p.price;
    $('#pk_desc').value=p.description||'';
    $('#pk_highlights').value=(p.highlights||[]).join(', ');
    state._pkgEditImg=p.imageUrl||p.image_url||null;
    const ci=$('#pk_current_img');
    if(ci&&state._pkgEditImg)ci.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Current Image</div><div style="position:relative;height:90px;border-radius:8px;overflow:hidden;max-width:180px"><img src="${state._pkgEditImg}" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-size:10px;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:12px">Upload new to replace</span></div></div>`;
  }
}
async function deletePackage(id){
  const{error}=await _sb.from('packages').delete().eq('id',id);
  if(error){toast('\u274c '+error.message);return;}
  toast('Deleted');await dbLoad();render();
}

// ── Destinations ──────────────────────────────────────────────────────────
async function saveDest(){
  const n=$('#dest_name')?.value;
  if(!n)return;
  let image_url=state._destEditImg||null;
  const dFile=$('#dest_image');
  if(dFile?.files?.length){
    try{toast('\u23f3 Uploading image...');image_url=await uploadImage('destination-images',dFile.files[0]);}
    catch(err){toast('\u274c Upload failed: '+err.message);return;}
  }
  let error;
  if(state.editingDest){
    ({error}=await _sb.from('destinations').update({name:n,image_url}).eq('id',state.editingDest));
    state.editingDest=null;
  }else{
    ({error}=await _sb.from('destinations').insert({id:uid(),name:n,image_url,active:true}));
  }
  state._destEditImg=null;
  if(error){toast('\u274c '+error.message);return;}
  toast('Destination saved!');await dbLoad();render();
}
function editDest(id){
  state.editingDest=id;render();
  const d=state.destinations.find(x=>x.id===id);
  if(d){
    $('#dest_name').value=d.name;
    state._destEditImg=d.imageUrl||d.image_url||null;
    const ci=$('#dest_current_img');
    if(ci&&state._destEditImg)ci.innerHTML=`<div style="font-size:11px;font-weight:700;color:var(--slate-500);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Current Image</div><div style="position:relative;height:90px;border-radius:8px;overflow:hidden;max-width:180px"><img src="${state._destEditImg}" style="width:100%;height:100%;object-fit:cover"><div style="position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-size:10px;background:rgba(0,0,0,.5);padding:2px 8px;border-radius:12px">Upload new to replace</span></div></div>`;
  }
}
async function deleteDest(id){
  const{error}=await _sb.from('destinations').delete().eq('id',id);
  if(error){toast('\u274c '+error.message);return;}
  toast('Deleted');await dbLoad();render();
}

// ── Enquiries ─────────────────────────────────────────────────────────────
let modalServices=[];
function toggleModalService(cb){const v=cb.value;if(cb.checked){if(!modalServices.includes(v))modalServices.push(v)}else{modalServices=modalServices.filter(s=>s!==v)}const ps=$('#pkg_section'),pp=$('#passport_section');if(ps)ps.classList.toggle('hidden',!modalServices.includes('Packages'));if(pp)pp.classList.toggle('hidden',!modalServices.includes('Passport'));$$('.chk-label').forEach(l=>{const inp=l.querySelector('input');l.classList.toggle('checked',inp?.checked)})}

async function saveEnquiry(){
  const name=$('#enq_name')?.value,phone=$('#enq_phone')?.value;
  if(!name||!phone){toast('Fill name & phone');return}
  const enq={
    id:uid(),customerName:name,phone,services:[...modalServices],
    assignedTo:$('#enq_staff')?.value||'',dueDate:$('#enq_due')?.value||'',
    tripType:$('#enq_tripType')?.value||'',pkgLocation:$('#enq_pkgLoc')?.value||'',
    pkgPacks:$('#enq_packs')?.value||'',pkgTravelDate:$('#enq_travelDate')?.value||'',
    pkgFlexDates:$('#enq_flexDates')?.checked||false,pkgNotes:$('#enq_pkgNotes')?.value||'',
    pkgHotel:$('#enq_hotel')?.value||'',pkgMeal:$('#enq_meal')?.value||'',
    passportType:$('#enq_passType')?.value||'New Registration',
    pkgStage:modalServices.includes('Packages')?PKG_STAGES[0]:null,
    passportStage:modalServices.includes('Passport')?PASSPORT_STAGES[0]:null,
    visaStage:modalServices.includes('Visa')?VISA_STAGES[0]:null,
    flightStage:modalServices.includes('Flight Ticket')?FLIGHT_STAGES[0]:null,
    currentStage:'Enquiry Received',createdAt:new Date().toISOString(),logs:['Enquiry created']
  };
  const{error}=await _sb.from('enquiries').insert(enqToDB(enq));
  if(error){toast('\u274c '+error.message);return;}
  modalServices=[];state.modal=null;toast('Enquiry created!');await dbLoad();render();
}

async function advanceStage(service){
  const e=state.enquiries.find(x=>x.id===state.selectedEnquiry);if(!e)return;
  const m={'Packages':['pkgStage',PKG_STAGES],'Passport':['passportStage',PASSPORT_STAGES],'Visa':['visaStage',VISA_STAGES],'Flight Ticket':['flightStage',FLIGHT_STAGES]};
  const[key,stages]=m[service];const idx=stages.indexOf(e[key]);
  if(idx<stages.length-1){
    e[key]=stages[idx+1];e.currentStage=stages[idx+1];
    e.logs.push(service+': moved to "'+stages[idx+1]+'"');
    await _sb.from('enquiries').update(enqToDB(e)).eq('id',e.id);
  }
  render();
}
async function setStage(service,stage){
  const e=state.enquiries.find(x=>x.id===state.selectedEnquiry);if(!e)return;
  const km={'Packages':'pkgStage','Passport':'passportStage','Visa':'visaStage','Flight Ticket':'flightStage'};
  e[km[service]]=stage;e.currentStage=stage;e.logs.push(service+': set to "'+stage+'"');
  await _sb.from('enquiries').update(enqToDB(e)).eq('id',e.id);render();
}
async function saveServiceNotes(eid,field,iid){
  const e=state.enquiries.find(x=>x.id===eid);const inp=$('#'+iid);
  if(e&&inp){e[field]=inp.value;e.logs.push('Updated notes');await _sb.from('enquiries').update(enqToDB(e)).eq('id',e.id);toast('Notes saved!');}
}
async function addLogNote(eid){
  const e=state.enquiries.find(x=>x.id===eid);const inp=$('#log_note');
  if(e&&inp&&inp.value.trim()){e.logs.push('Note: '+inp.value.trim());await _sb.from('enquiries').update({logs:e.logs}).eq('id',e.id);render();}
}
